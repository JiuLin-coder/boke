name: 打包vue项目

on: push

permissions:
  contents: write

jobs:
  npm-build:
    name: npm-bulid工作
    runs-on: ubuntu-latest

    steps:
      - name: 检查仓库内容
        uses: actions/checkout@v4

      - name: 库安装和打包
        run: |
          npm install
          npm run build

      - name: 部署
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist  #这个文件夹取决于你打包工具最终的文件夹命名，所以最好现在本地测试最终生产环境的文件夹叫什么
          
