name: 打包vue项目
on: push

permissions: 
  contents: write

jobs:
  npm-build:
    name: npm-build工作
    runs-on: ubuntu-latest
    
    steps:
      - name: 检查仓库内容
        uses: actions/checkout@v4
      
      - name: 库安装和打包
        run: | 
          npm install
          npm run build
      
      - name: 部署
        uses: JamesIves/github-pages-deploy-action@4
        with:
          branch: gh-pages
          folder: dist

